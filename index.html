<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!--
      user-scalable=no removed — it's an accessibility violation (WCAG 1.4.4).
      Users who need to zoom (low vision, motor issues) must be able to.
      maximum-scale=5 allows zoom while still preventing accidental double-tap zoom on iOS.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />

    <!-- SEO: meta description shown in search engine results -->
    <meta name="description" content="CruPoint — Pesticide application tracking and DPR compliance for landscape crews. Log spray applications, manage crews, and generate reports." />

    <!-- PWA / iOS home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.json" />

    <title>CruPoint</title>

    <!-- IBM Plex fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

    <!-- Preconnect to tile servers used by Leaflet — reduces map tile latency -->
    <link rel="preconnect" href="https://tile.openstreetmap.org" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      body { font-family: 'IBM Plex Sans', system-ui, sans-serif; background: #F4F5F7; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
